services:
  patient-account-service-ui:
    build:
      context: .
      dockerfile: Dockerfile
    image: patient-account-service-ui:latest
    container_name: patient-account-service-ui
    ports:
      - "4200:8080"
    environment:
      - BACKEND_URL=http://patient-account-service:8080
    networks:
      - patient-account-net

networks:
  patient-account-net:
    external: true
    name: patient-account-net

