services:
  patient-account-service-ui-dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: patient-account-service-ui:dev
    ports:
      - "${UI_DEV_PORT:-4200}:4200"
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://host.containers.internal:8080}
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - ui_node_modules:/app/node_modules
    command: npm run start:proxy
    networks:
      - patient-account-net

  patient-account-service-ui:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      args:
        BUILD_CONFIGURATION: ${ANGULAR_BUILD_CONFIGURATION:-production}
    image: patient-account-service-ui:latest
    ports:
      - "${UI_PROD_PORT:-8088}:8080"
    environment:
      API_UPSTREAM: ${API_UPSTREAM:-http://patient-account-service:8080}
      API_BASE_URL: ${API_BASE_URL:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - patient-account-net

networks:
  patient-account-net:
    name: ${APP_NETWORK:-patient-account-net}

volumes:
  ui_node_modules:

